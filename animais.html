<!DOCTYPE html>
<html>

<head>

<title>Animais</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🐑 Animais</h1>

<button onclick="novoAnimal()">+ Novo Animal</button>

<ul id="listaAnimais"></ul>

<script>

let animais=[]

function novoAnimal(){

let nome = prompt("Nome do animal")

if(nome){

animais.push(nome)

mostrar()

}

}

function mostrar(){

let lista = document.getElementById("listaAnimais")

lista.innerHTML=""

animais.forEach(a=>{

let li=document.createElement("li")

li.innerText=a

lista.appendChild(li)

})

}

</script>

</body>

</html>
