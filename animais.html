<!DOCTYPE html>
<html>

<head>

  <button onclick="voltar()">⬅ Voltar</button>
  
<title>Animais - AgroStock</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🐑 Animais</h1>

<h2>Novo Animal</h2>

<div>

<p>ID do animal: <b id="novoID"></b></p>

<input id="nome" placeholder="Nome">

<select id="especie">
<option>Ovino</option>
<option>Bovino</option>
<option>Caprino</option>
<option>Suíno</option>
<option>Aves</option>
</select>

<input id="raca" list="listaRacas" placeholder="Raça">
<datalist id="listaRacas"></datalist>

<select id="sexo">
<option>Macho</option>
<option>Fêmea</option>
<option>Castrado</option>
</select>

<input id="nascimento" type="date">

<input id="pai" list="listaPais" placeholder="Pai">
<datalist id="listaPais"></datalist>

<input id="mae" list="listaMaes" placeholder="Mãe">
<datalist id="listaMaes"></datalist>

<input id="peso" placeholder="Peso (kg)">

<input id="sanidade" placeholder="Evento sanitário">

<button onclick="adicionarAnimal()">Guardar</button>

</div>

<hr>

<h2>Lista de Animais</h2>

<table border="1">

<thead>

<tr>
<th>ID</th>
<th>Nome</th>
<th>Espécie</th>
<th>Raça</th>
<th>Sexo</th>
<th>Nascimento</th>
<th>Peso</th>
<th>Editar</th>
<th>Apagar</th>
</tr>

</thead>

<tbody id="tabelaAnimais"></tbody>

</table>

<script>

function voltar(){

window.location = "index.html"

}
  
document.getElementById("novoID").innerText = gerarIDPreview()

  
let animais = JSON.parse(localStorage.getItem("animais")) || []

mostrarAnimais()

  atualizarID()
  
function adicionarAnimal(){

let idAtual = proximoID()

let animal = {

id:idAtual,
nome:document.getElementById("nome").value,
especie:document.getElementById("especie").value,
raca:document.getElementById("raca").value,
sexo:document.getElementById("sexo").value,
nascimento:document.getElementById("nascimento").value,
pai:document.getElementById("pai").value,
mae:document.getElementById("mae").value,
peso:document.getElementById("peso").value,
sanidade:document.getElementById("sanidade").value

}

animais.push(animal)

localStorage.setItem("animais",JSON.stringify(animais))

localStorage.setItem("ultimoID",parseInt(idAtual))

mostrarAnimais()

atualizarID()

}

function mostrarAnimais(){

let tabela = document.getElementById("tabelaAnimais")

tabela.innerHTML=""

animais.forEach((a,index)=>{

let linha = document.createElement("tr")

linha.innerHTML = `

<td>${a.id}</td>
<td>${a.nome}</td>
<td>${a.especie}</td>
<td>${a.raca}</td>
<td>${a.sexo}</td>
<td>${a.nascimento}</td>
<td>${a.peso}</td>

<td>
<button onclick="editarAnimal(${index})">✏</button>
</td>

<td>
<button onclick="apagarAnimal(${index})">🗑</button>
</td>

`

tabela.appendChild(linha)

})

}

function apagarAnimal(index){

if(confirm("Apagar este animal?")){

animais.splice(index,1)

localStorage.setItem("animais",JSON.stringify(animais))

mostrarAnimais()

  atualizarID()

}

}

  function editarAnimal(index){

let animal = animais[index]

let novoNome = prompt("Nome",animal.nome)
let novoPeso = prompt("Peso",animal.peso)

if(novoNome !== null){

animal.nome = novoNome
animal.peso = novoPeso

localStorage.setItem("animais",JSON.stringify(animais))

mostrarAnimais()

  atualizarID()

}

}
  
function carregarBase(tipo,listaID){

let base = JSON.parse(localStorage.getItem(tipo)) || []

let lista = document.getElementById(listaID)

lista.innerHTML=""

base.forEach(v=>{

let opt=document.createElement("option")

opt.value=v

lista.appendChild(opt)

})

}
  
function proximoID(){

let ultimo = localStorage.getItem("ultimoID")

if(!ultimo){

ultimo = 0

}

ultimo = parseInt(ultimo) + 1

return String(ultimo).padStart(3,"0")

}

  function atualizarID(){

document.getElementById("novoID").innerText = proximoID()

}

function guardarBase(tipo,valor){

if(!valor) return

let base = JSON.parse(localStorage.getItem(tipo)) || []

if(!base.includes(valor)){

base.push(valor)

localStorage.setItem(tipo,JSON.stringify(base))

}

}

carregarBase("racas","listaRacas")
carregarBase("pais","listaPais")
carregarBase("maes","listaMaes")
  
</script>

</body>

</html>
