<!DOCTYPE html>
<html>

<head>

<title>Animais - AgroStock</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<button onclick="voltar()">⬅ Voltar</button>

<h1>🐑 Animais</h1>

<h2>Novo Animal</h2>

<div>

<p>ID do animal: <b id="novoID"></b></p>

<input id="nome" placeholder="Nome">

<select id="especie">
<option>Ovino</option>
<option>Bovino</option>
<option>Caprino</option>
<option>Suíno</option>
<option>Aves</option>
</select>

<input id="raca" list="listaRacas" placeholder="Raça">
<datalist id="listaRacas"></datalist>

<select id="sexo">
<option>Macho</option>
<option>Fêmea</option>
<option>Castrado</option>
</select>

<input id="nascimento" type="date">

<input id="pai" list="listaPais" placeholder="Pai">
<datalist id="listaPais"></datalist>

<input id="mae" list="listaMaes" placeholder="Mãe">
<datalist id="listaMaes"></datalist>

<input id="peso" placeholder="Peso (kg)">
<input id="sanidade" placeholder="Evento sanitário">

<button onclick="guardarAnimal()">Guardar</button>

</div>

<hr>

<h2>Lista de Animais</h2>

<table border="1">

<thead>
<tr>
<th>ID</th>
<th>Nome</th>
<th>Espécie</th>
<th>Raça</th>
<th>Sexo</th>
<th>Nascimento</th>
<th>Peso</th>
<th>Editar</th>
<th>Apagar</th>
</tr>
</thead>

<tbody id="tabelaAnimais"></tbody>

</table>

<script>

let animalEmEdicao = null

function voltar(){
window.location = "index.html"
}

let animais = JSON.parse(localStorage.getItem("animais")) || []

mostrarAnimais()
atualizarID()

carregarBase("racas","listaRacas")
carregarBase("pais","listaPais")
carregarBase("maes","listaMaes")

function guardarAnimal(){

let idAtual

if(animalEmEdicao !== null){
idAtual = animais[animalEmEdicao].id
}else{
idAtual = proximoID()
}

let animal = {

id:idAtual,
nome:document.getElementById("nome").value,
especie:document.getElementById("especie").value,
raca:document.getElementById("raca").value,
sexo:document.getElementById("sexo").value,
nascimento:document.getElementById("nascimento").value,
pai:document.getElementById("pai").value,
mae:document.getElementById("mae").value,
peso:document.getElementById("peso").value,
sanidade:document.getElementById("sanidade").value

}

if(animalEmEdicao !== null){

animais[animalEmEdicao] = animal
animalEmEdicao = null

}else{

animais.push(animal)

}

localStorage.setItem("animais",JSON.stringify(animais))

guardarBase("racas",animal.raca)
guardarBase("pais",animal.pai)
guardarBase("maes",animal.mae)

mostrarAnimais()
atualizarID()
limparFormulario()

}

function mostrarAnimais(){

<button onclick="editarAnimal(${index})">✏</button>
  
let tabela = document.getElementById("tabelaAnimais")

tabela.innerHTML=""

animais.forEach((a,index)=>{

let linha = document.createElement("tr")

linha.innerHTML = `
<td>${a.id}</td>
<td>${a.nome}</td>
<td>${a.especie}</td>
<td>${a.raca}</td>
<td>${a.sexo}</td>
<td>${a.nascimento}</td>
<td>${a.peso}</td>

<td>
<button onclick="editarAnimal(${index})">✏</button>
</td>

<td>
<button onclick="apagarAnimal(${index})">🗑</button>
</td>
`

tabela.appendChild(linha)

})

}

function apagarAnimal(index){

if(confirm("Apagar este animal?")){

animais.splice(index,1)

localStorage.setItem("animais",JSON.stringify(animais))

mostrarAnimais()
atualizarID()

}

}

function editarAnimal(index){

animalEmEdicao = index

let animal = animais[index]

document.getElementById("nome").value = animal.nome
document.getElementById("especie").value = animal.especie
document.getElementById("raca").value = animal.raca
document.getElementById("sexo").value = animal.sexo
document.getElementById("nascimento").value = animal.nascimento
document.getElementById("pai").value = animal.pai
document.getElementById("mae").value = animal.mae
document.getElementById("peso").value = animal.peso
document.getElementById("sanidade").value = animal.sanidade

document.getElementById("novoID").innerText = animal.id

}

function proximoID(){

let ids = animais.map(a => parseInt(a.id))

let i = 1

while(ids.includes(i)){
i++
}

return String(i).padStart(3,"0")

}

function atualizarID(){

document.getElementById("novoID").innerText = proximoID()

}

function limparFormulario(){

document.getElementById("nome").value=""
document.getElementById("raca").value=""
document.getElementById("nascimento").value=""
document.getElementById("pai").value=""
document.getElementById("mae").value=""
document.getElementById("peso").value=""
document.getElementById("sanidade").value=""

}

function guardarBase(tipo,valor){

if(!valor) return

let base = JSON.parse(localStorage.getItem(tipo)) || []

if(!base.includes(valor)){

base.push(valor)

localStorage.setItem(tipo,JSON.stringify(base))

}

}

function carregarBase(tipo,listaID){

let base = JSON.parse(localStorage.getItem(tipo)) || []

let lista = document.getElementById(listaID)

lista.innerHTML=""

base.forEach(v=>{

let opt=document.createElement("option")

opt.value=v

lista.appendChild(opt)

})

}

</script>

</body>

</html>
